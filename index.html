<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帰宅困難者向け一時滞在施設 - 稼働状況</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f4f8;
            padding: 12px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        /* ===== ヘッダー ===== */
        h1 {
            color: #1a202c;
            font-size: clamp(16px, 4vw, 24px);
            border-bottom: 3px solid #38a169;
            padding-bottom: 10px;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .update-time {
            color: #718096;
            font-size: clamp(11px, 2.5vw, 13px);
            margin-bottom: 14px;
        }

        /* ===== 凡例 ===== */
        .legend {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: clamp(11px, 2.5vw, 13px);
            background: #f7fafc;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        /* ===== PC用テーブル ===== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .pc-table { display: table; width: 100%; }
        .sp-cards { display: none; }

        table { width: 100%; border-collapse: collapse; }

        th {
            background-color: #2d3748;
            color: white;
            padding: 11px 12px;
            text-align: left;
            font-size: 13px;
            white-space: nowrap;
        }

        td {
            padding: 11px 12px;
            border-bottom: 1px solid #edf2f7;
            font-size: 13px;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f7fafc; }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            white-space: nowrap;
        }

        .status-available { background-color: #38a169; }
        .status-almost    { background-color: #dd6b20; }
        .status-full      { background-color: #e53e3e; }

        .check-yes { color: #38a169; font-weight: bold; font-size: 15px; }
        .check-no  { color: #cbd5e0; font-size: 15px; }

        /* ===== スマホ用カード ===== */
        .shelter-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
            gap: 8px;
        }

        .card-name {
            font-size: 14px;
            font-weight: bold;
            color: #1a202c;
            flex: 1;
            line-height: 1.4;
        }

        .card-body {
            padding: 12px 14px;
        }

        .card-address {
            font-size: 12px;
            color: #718096;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }

        .card-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .card-info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f7fafc;
            border-radius: 8px;
            padding: 8px 4px;
            text-align: center;
        }

        .card-info-icon { font-size: 18px; margin-bottom: 2px; }
        .card-info-label { font-size: 10px; color: #718096; margin-bottom: 2px; }
        .card-info-value { font-size: 12px; font-weight: bold; color: #2d3748; }

        /* ===== 管理者ボタン ===== */
        .admin-toggle {
            margin-top: 20px;
            text-align: right;
        }

        .admin-toggle button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .admin-toggle button:hover { background: #2d3748; }

        /* ===== パスワード画面 ===== */
        #passwordModal {
            display: none;
            margin-top: 16px;
            background: #f8fafc;
            border: 2px solid #a0aec0;
            border-radius: 10px;
            padding: 20px;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        #passwordModal h2 {
            color: #2d3748;
            margin-bottom: 14px;
            font-size: 16px;
            text-align: center;
        }

        .password-form { display: flex; flex-direction: column; gap: 10px; }

        .password-form input {
            padding: 11px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 15px;
            letter-spacing: 2px;
            width: 100%;
        }

        .password-form input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
        }

        .login-btn {
            background: #3182ce;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .login-btn:hover { background: #2b6cb0; }

        #passwordError {
            color: #e53e3e;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        /* ===== 管理パネル ===== */
        #adminPanel { display: none; margin-top: 16px; }

        .admin-header {
            background: #2b6cb0;
            color: white;
            padding: 13px 16px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h2 { font-size: clamp(14px, 3.5vw, 17px); }

        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .logout-btn:hover { background: #c53030; }

        /* ===== タブ ===== */
        .tabs {
            display: flex;
            background: #ebf4ff;
            border-left: 2px solid #4299e1;
            border-right: 2px solid #4299e1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            padding: 11px 14px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: clamp(11px, 2.8vw, 13px);
            font-weight: bold;
            color: #718096;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .tab-btn:hover { color: #2b6cb0; background: #bee3f8; }
        .tab-btn.active { color: #2b6cb0; border-bottom-color: #2b6cb0; background: white; }

        .tab-content {
            display: none;
            padding: 20px 16px;
            background: #ebf8ff;
            border: 2px solid #4299e1;
            border-top: none;
            border-radius: 0 0 10px 10px;
        }

        .tab-content.active { display: block; }

        /* ===== フォーム共通 ===== */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            color: #4a5568;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66,153,225,0.2);
        }

        /* チェックボックス */
        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            cursor: pointer;
            background: white;
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .checkbox-item input[type="checkbox"] {
            width: 17px;
            height: 17px;
            cursor: pointer;
        }

        /* ボタン */
        .btn {
            padding: 11px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }

        .btn-primary  { background: #3182ce; color: white; }
        .btn-primary:hover  { background: #2b6cb0; }
        .btn-primary:disabled { background: #90cdf4; cursor: not-allowed; }

        .btn-danger   { background: #e53e3e; color: white; }
        .btn-danger:hover   { background: #c53030; }

        .btn-success  { background: #38a169; color: white; }
        .btn-success:hover  { background: #276749; }

        .btn-cancel   { background: #a0aec0; color: white; }
        .btn-cancel:hover   { background: #718096; }

        .btn-group    { display: flex; gap: 10px; }
        .btn-group .btn { margin-top: 0; }

        /* メッセージ */
        .result-msg {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
            line-height: 1.5;
        }

        .result-msg.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .result-msg.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        /* 削除確認 */
        .delete-confirm {
            display: none;
            margin-top: 14px;
            padding: 14px;
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: 8px;
        }

        .delete-confirm p {
            color: #c53030;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 13px;
        }

        footer {
            margin-top: 24px;
            text-align: center;
            color: #a0aec0;
            font-size: 11px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }

        /* ===== レスポンシブ ===== */
        @media (max-width: 640px) {
            body { padding: 8px; }
            .container { padding: 14px; border-radius: 10px; }

            /* PC表→スマホカード切り替え */
            .pc-table  { display: none; }
            .sp-cards  { display: block; }

            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: 1; }

            .tabs { border-radius: 0; }
            .tab-btn { padding: 10px 10px; font-size: 11px; }

            .checkbox-group { gap: 8px; }
            .checkbox-item  { padding: 6px 10px; font-size: 12px; }
        }

        @media (min-width: 641px) and (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: 1; }
        }
    </style>
</head>
<body>
<div class="container">

    <h1>🏢 帰宅困難者向け一時滞在施設<br>稼働状況</h1>
    <p class="update-time">最終更新: <span id="updateTime"></span>　／　30秒ごとに自動更新</p>

    <!-- 凡例 -->
    <div class="legend">
        <div class="legend-item"><div class="legend-color status-available"></div>余裕あり</div>
        <div class="legend-item"><div class="legend-color status-almost"></div>もうすぐ満室</div>
        <div class="legend-item"><div class="legend-color status-full"></div>満室</div>
    </div>

    <!-- PC用テーブル -->
    <div class="table-wrapper pc-table">
        <table>
            <thead>
                <tr>
                    <th>稼働状況</th>
                    <th>施設名</th>
                    <th>住所</th>
                    <th>収容人数</th>
                    <th>トイレ</th>
                    <th>充電</th>
                    <th>備蓄物資</th>
                </tr>
            </thead>
            <tbody id="shelterTable">
                <tr><td colspan="7" style="text-align:center;padding:30px;color:#a0aec0;">読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- スマホ用カード -->
    <div class="sp-cards" id="shelterCards">
        <div style="text-align:center;padding:30px;color:#a0aec0;">読み込み中...</div>
    </div>

    <!-- 管理者ボタン -->
    <div class="admin-toggle">
        <button onclick="showPasswordModal()">🔧 管理者メニュー</button>
    </div>

    <!-- パスワード入力 -->
    <div id="passwordModal">
        <h2>🔑 管理者ログイン</h2>
        <div class="password-form">
            <input type="password" id="passwordInput" placeholder="パスワードを入力"
                onkeydown="if(event.key==='Enter') checkPassword()"/>
            <p id="passwordError">❌ パスワードが違います</p>
            <button class="login-btn" onclick="checkPassword()">ログイン</button>
        </div>
    </div>

    <!-- 管理パネル -->
    <div id="adminPanel">
        <div class="admin-header">
            <h2>🔧 管理パネル</h2>
            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event,'tab1')">📋 稼働状況</button>
            <button class="tab-btn" onclick="switchTab(event,'tab2')">➕ 施設追加</button>
            <button class="tab-btn" onclick="switchTab(event,'tab3')">✏️ 施設編集</button>
            <button class="tab-btn" onclick="switchTab(event,'tab4')">🗑️ 施設削除</button>
        </div>

        <!-- タブ1: 稼働状況の更新 -->
        <div id="tab1" class="tab-content active">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>📍 施設名を選択</label>
                    <select id="statusShelterId">
                        <option value="">-- 施設を選んでください --</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>🚦 稼働状況を選択</label>
                    <select id="statusSelect">
                        <option value="">-- 状況を選んでください --</option>
                        <option value="available">✅ 余裕あり</option>
                        <option value="almost">🟠 もうすぐ満室</option>
                        <option value="full">🔴 満室</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="updateStatus()">更新する</button>
            <div id="msg1" class="result-msg"></div>
        </div>

        <!-- タブ2: 施設を追加 -->
        <div id="tab2" class="tab-content">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>🏢 施設名 <span style="color:red">*</span></label>
                    <input type="text" id="addName" placeholder="例：なんば市民センター"/>
                </div>
                <div class="form-group full-width">
                    <label>📍 住所 <span style="color:red">*</span></label>
                    <input type="text" id="addAddress" placeholder="例：大阪府大阪市中央区〇〇1-2-3"/>
                </div>
                <div class="form-group full-width">
                    <label>👥 最大収容人数 <span style="color:red">*</span></label>
                    <input type="number" id="addCapacity" placeholder="例：200" min="1"/>
                </div>
                <div class="form-group full-width">
                    <label>🚦 初期稼働状況</label>
                    <select id="addStatus">
                        <option value="available">✅ 余裕あり</option>
                        <option value="almost">🟠 もうすぐ満室</option>
                        <option value="full">🔴 満室</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>🔧 設備</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="addToilet" checked/> 🚽 トイレ
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="addCharging" checked/> 🔌 充電
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="addSupplies" checked/> 📦 備蓄物資
                        </label>
                    </div>
                </div>
            </div>
            <button class="btn btn-success" onclick="addShelter()">➕ 追加する</button>
            <div id="msg2" class="result-msg"></div>
        </div>

        <!-- タブ3: 施設情報を編集 -->
        <div id="tab3" class="tab-content">
            <div class="form-group" style="margin-bottom:16px;">
                <label>📍 編集する施設を選択</label>
                <select id="editShelterId" onchange="loadEditForm()">
                    <option value="">-- 施設を選んでください --</option>
                </select>
            </div>
            <div id="editForm" style="display:none;">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>🏢 施設名</label>
                        <input type="text" id="editName"/>
                    </div>
                    <div class="form-group full-width">
                        <label>📍 住所</label>
                        <input type="text" id="editAddress"/>
                    </div>
                    <div class="form-group full-width">
                        <label>👥 最大収容人数</label>
                        <input type="number" id="editCapacity" min="1"/>
                    </div>
                    <div class="form-group full-width">
                        <label>🚦 稼働状況</label>
                        <select id="editStatus">
                            <option value="available">✅ 余裕あり</option>
                            <option value="almost">🟠 もうすぐ満室</option>
                            <option value="full">🔴 満室</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>🔧 設備</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="editToilet"/> 🚽 トイレ
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="editCharging"/> 🔌 充電
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="editSupplies"/> 📦 備蓄物資
                            </label>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="saveShelter()">💾 保存する</button>
            </div>
            <div id="msg3" class="result-msg"></div>
        </div>

        <!-- タブ4: 施設を削除 -->
        <div id="tab4" class="tab-content">
            <div class="form-group" style="margin-bottom:16px;">
                <label>🗑️ 削除する施設を選択</label>
                <select id="deleteShelterId" onchange="showDeleteConfirm()">
                    <option value="">-- 施設を選んでください --</option>
                </select>
            </div>
            <div id="deleteConfirm" class="delete-confirm">
                <p>⚠️ 本当に削除しますか？この操作は取り消せません。</p>
                <p id="deleteTargetName" style="color:#742a2a;margin-bottom:12px;font-size:13px;"></p>
                <div class="btn-group">
                    <button class="btn btn-danger" onclick="deleteShelter()">🗑️ 削除する</button>
                    <button class="btn btn-cancel" onclick="cancelDelete()">キャンセル</button>
                </div>
            </div>
            <div id="msg4" class="result-msg"></div>
        </div>
    </div>

    <footer>
        <p>※ 稼働状況は随時変更されます。最新情報をご確認ください。</p>
    </footer>
</div>

<script>
    const SUPABASE_URL  = 'https://bbgpwmkyfvkpogmbikbz.supabase.co';
    const SUPABASE_KEY  = 'sb_publishable_5RdECTeM34awt0h8TDlf-w_GTyXhR80';
    const ADMIN_PASSWORD = 'kitakukonnan@Namba';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusMap = {
        available: { label: '余裕あり',     cls: 'status-available', emoji: '✅' },
        almost:    { label: 'もうすぐ満室', cls: 'status-almost',    emoji: '🟠' },
        full:      { label: '満室',         cls: 'status-full',      emoji: '🔴' },
    };

    let sheltersCache = [];

    /* ===== パスワード ===== */
    function showPasswordModal() {
        const modal = document.getElementById('passwordModal');
        const panel = document.getElementById('adminPanel');
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            return;
        }
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordError').style.display = 'none';
    }

    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('adminPanel').style.display   = 'block';
            document.getElementById('passwordError').style.display = 'none';
            loadShelters();
        } else {
            document.getElementById('passwordError').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
    }

    function logout() {
        sessionStorage.removeItem('adminLoggedIn');
        document.getElementById('adminPanel').style.display = 'none';
    }

    /* ===== タブ ===== */
    function switchTab(e, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        e.target.classList.add('active');
    }

    /* ===== データ取得・描画 ===== */
    async function loadShelters() {
        const { data, error } = await db.from('shelters').select('*').order('id');
        if (error) {
            const errHtml = '<tr><td colspan="7" style="text-align:center;color:red;padding:20px;">データの取得に失敗しました。</td></tr>';
            document.getElementById('shelterTable').innerHTML = errHtml;
            document.getElementById('shelterCards').innerHTML = '<p style="color:red;text-align:center;">データの取得に失敗しました。</p>';
            return;
        }
        sheltersCache = data;

        /* PC用テーブル */
        document.getElementById('shelterTable').innerHTML = data.map(s => {
            const st = statusMap[s.status] || statusMap['available'];
            return `<tr>
                <td><span class="status-badge ${st.cls}">${st.label}</span></td>
                <td>${s.name}</td>
                <td>${s.address}</td>
                <td style="text-align:center;">${s.capacity}人</td>
                <td style="text-align:center;"><span class="${s.toilet   ?'check-yes':'check-no'}">${s.toilet   ?'◯':'×'}</span></td>
                <td style="text-align:center;"><span class="${s.charging ?'check-yes':'check-no'}">${s.charging ?'◯':'×'}</span></td>
                <td style="text-align:center;"><span class="${s.supplies ?'check-yes':'check-no'}">${s.supplies ?'◯':'×'}</span></td>
            </tr>`;
        }).join('');

        /* スマホ用カード */
        document.getElementById('shelterCards').innerHTML = data.map(s => {
            const st = statusMap[s.status] || statusMap['available'];
            return `
            <div class="shelter-card">
                <div class="card-header">
                    <div class="card-name">${s.name}</div>
                    <span class="status-badge ${st.cls}">${st.label}</span>
                </div>
                <div class="card-body">
                    <div class="card-address">📍 ${s.address}</div>
                    <div class="card-info-grid">
                        <div class="card-info-item">
                            <div class="card-info-icon">👥</div>
                            <div class="card-info-label">収容人数</div>
                            <div class="card-info-value">${s.capacity}人</div>
                        </div>
                        <div class="card-info-item">
                            <div class="card-info-icon">${s.toilet ? '🚽' : '🚫'}</div>
                            <div class="card-info-label">トイレ</div>
                            <div class="card-info-value" style="color:${s.toilet?'#38a169':'#e53e3e'}">${s.toilet ? '使用可' : '使用不可'}</div>
                        </div>
                        <div class="card-info-item">
                            <div class="card-info-icon">${s.charging ? '🔌' : '🚫'}</div>
                            <div class="card-info-label">充電</div>
                            <div class="card-info-value" style="color:${s.charging?'#38a169':'#e53e3e'}">${s.charging ? '可能' : '不可'}</div>
                        </div>
                        <div class="card-info-item" style="grid-column: 1 / -1;">
                            <div class="card-info-icon">${s.supplies ? '📦' : '🚫'}</div>
                            <div class="card-info-label">備蓄物資</div>
                            <div class="card-info-value" style="color:${s.supplies?'#38a169':'#e53e3e'}">${s.supplies ? 'あり' : 'なし'}</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');

        /* 各セレクトリスト更新 */
        const opts = '<option value="">-- 施設を選んでください --</option>' +
            data.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        ['statusShelterId','editShelterId','deleteShelterId'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = opts;
        });
    }

    /* ===== タブ1: 稼働状況更新 ===== */
    async function updateStatus() {
        const shelterId = document.getElementById('statusShelterId').value;
        const newStatus = document.getElementById('statusSelect').value;
        if (!shelterId || !newStatus) {
            showMsg('msg1','⚠️ 施設名と稼働状況を両方選択してください。','error'); return;
        }
        const { error } = await db.from('shelters')
            .update({ status: newStatus, updated_at: new Date().toISOString() })
            .eq('id', shelterId);
        if (error) {
            showMsg('msg1','❌ 更新に失敗しました。','error');
        } else {
            const name  = document.getElementById('statusShelterId').selectedOptions[0].text;
            showMsg('msg1',`✅ 「${name}」を「${statusMap[newStatus].label}」に更新しました！`,'success');
            await loadShelters();
        }
    }

    /* ===== タブ2: 施設を追加 ===== */
    async function addShelter() {
        const name     = document.getElementById('addName').value.trim();
        const address  = document.getElementById('addAddress').value.trim();
        const capacity = parseInt(document.getElementById('addCapacity').value);
        const status   = document.getElementById('addStatus').value;
        const toilet   = document.getElementById('addToilet').checked;
        const charging = document.getElementById('addCharging').checked;
        const supplies = document.getElementById('addSupplies').checked;
        if (!name || !address || !capacity) {
            showMsg('msg2','⚠️ 施設名・住所・収容人数は必須です。','error'); return;
        }
        const { error } = await db.from('shelters').insert([{
            name, address, capacity, status, toilet, charging, supplies,
            updated_at: new Date().toISOString()
        }]);
        if (error) {
            showMsg('msg2','❌ 追加に失敗しました。','error');
        } else {
            showMsg('msg2',`✅ 「${name}」を追加しました！`,'success');
            ['addName','addAddress','addCapacity'].forEach(id => document.getElementById(id).value='');
            document.getElementById('addToilet').checked = document.getElementById('addCharging').checked = document.getElementById('addSupplies').checked = true;
            await loadShelters();
        }
    }

    /* ===== タブ3: 施設情報を編集 ===== */
    function loadEditForm() {
        const id = document.getElementById('editShelterId').value;
        const editForm = document.getElementById('editForm');
        if (!id) { editForm.style.display = 'none'; return; }
        const s = sheltersCache.find(x => x.id == id);
        if (!s) return;
        document.getElementById('editName').value       = s.name;
        document.getElementById('editAddress').value   = s.address;
        document.getElementById('editCapacity').value  = s.capacity;
        document.getElementById('editStatus').value    = s.status;
        document.getElementById('editToilet').checked  = s.toilet;
        document.getElementById('editCharging').checked= s.charging;
        document.getElementById('editSupplies').checked= s.supplies;
        editForm.style.display = 'block';
    }

    async function saveShelter() {
        const id       = document.getElementById('editShelterId').value;
        const name     = document.getElementById('editName').value.trim();
        const address  = document.getElementById('editAddress').value.trim();
        const capacity = parseInt(document.getElementById('editCapacity').value);
        const status   = document.getElementById('editStatus').value;
        const toilet   = document.getElementById('editToilet').checked;
        const charging = document.getElementById('editCharging').checked;
        const supplies = document.getElementById('editSupplies').checked;
        if (!name || !address || !capacity) {
            showMsg('msg3','⚠️ 施設名・住所・収容人数は必須です。','error'); return;
        }
        const { error } = await db.from('shelters')
            .update({ name, address, capacity, status, toilet, charging, supplies,
                      updated_at: new Date().toISOString() })
            .eq('id', id);
        if (error) {
            showMsg('msg3','❌ 保存に失敗しました。','error');
        } else {
            showMsg('msg3',`✅ 「${name}」の情報を保存しました！`,'success');
            await loadShelters();
        }
    }

    /* ===== タブ4: 施設を削除 ===== */
    function showDeleteConfirm() {
        const id = document.getElementById('deleteShelterId').value;
        const confirmDiv = document.getElementById('deleteConfirm');
        if (!id) { confirmDiv.style.display = 'none'; return; }
        const s = sheltersCache.find(x => x.id == id);
        if (!s) return;
        document.getElementById('deleteTargetName').textContent = `「${s.name}」を削除します`;
        confirmDiv.style.display = 'block';
    }

    function cancelDelete() {
        document.getElementById('deleteShelterId').value = '';
        document.getElementById('deleteConfirm').style.display = 'none';
    }

    async function deleteShelter() {
        const id   = document.getElementById('deleteShelterId').value;
        const name = document.getElementById('deleteShelterId').selectedOptions[0].text;
        const { error } = await db.from('shelters').delete().eq('id', id);
        if (error) {
            showMsg('msg4','❌ 削除に失敗しました。','error');
        } else {
            showMsg('msg4',`✅ 「${name}」を削除しました。`,'success');
            document.getElementById('deleteConfirm').style.display = 'none';
            await loadShelters();
        }
    }

    /* ===== メッセージ表示 ===== */
    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent    = text;
        el.className      = `result-msg ${type}`;
        el.style.display  = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    /* ===== 時刻表示 ===== */
    function updateTime() {
        const now = new Date();
        document.getElementById('updateTime').textContent =
            `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ` +
            `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    }

    /* ===== 初期化 ===== */
    loadShelters();
    updateTime();
    setInterval(updateTime, 60000);
    setInterval(loadShelters, 30000);
</script>
</body>
</html>
